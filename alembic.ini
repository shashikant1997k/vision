# Alembic config for PostgreSQL migrations (D-013).
# The DB URL is read from the DATABASE_URL env var via alembic/env.py.
# Generate the first migration against Postgres:
#   pip install -e ".[postgres]"
#   DATABASE_URL=postgresql+psycopg://user:pass@host/db alembic revision --autogenerate -m "initial"
#   DATABASE_URL=... alembic upgrade head
[alembic]
script_location = alembic
prepend_sys_path = src

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[handler_console]
class = StreamHandler
args = (sys_stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
